<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080808;
    --dark: #0d0d0d;
    --cell: #111111;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --white: #ffffff;
    --muted: rgba(255,255,255,0.38);
    --accent: rgba(255,255,255,0.85);
    --grid-size: 140px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  .grid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    pointer-events: none;
  }

  /* crosshair dots at intersections */
  .grid-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    background-position: -1px -1px;
  }

  /* ── SCANLINE overlay ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .site {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  /* ── LOGO ── */
  .logo-wrap {
    margin-bottom: 72px;
    opacity: 0;
    transform: translateY(-20px);
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  }

  .logo-img {
    width: 200px;
    filter: invert(1);
    display: block;
  }

  /* ── HEADLINE SECTION ── */
  .headline {
    text-align: center;
    margin-bottom: 80px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .headline h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 20px;
  }

  .headline h1 span {
    color: var(--muted);
    font-weight: 300;
  }

  .headline p {
    font-size: 15px;
    font-weight: 300;
    color: var(--muted);
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.7;
    letter-spacing: 0.01em;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
    margin: 0 auto 64px;
    opacity: 0;
    animation: fadeIn 1s ease 0.7s forwards;
  }

  /* ── GRID SOCIALS ── */
  .socials-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.9s forwards;
  }

  .socials-grid {
    display: grid;
    grid-template-columns: repeat(4, var(--grid-size));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1s forwards;
  }

  .social-cell {
    background: var(--cell);
    width: var(--grid-size);
    height: var(--grid-size);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-decoration: none;
    color: var(--white);
    position: relative;
    overflow: hidden;
    transition: background 0.3s ease;
    cursor: pointer;
  }

  /* crosshair corners */
  .social-cell::before,
  .social-cell::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .social-cell::before {
    top: 8px; left: 8px;
    border-top: 1px solid var(--border-hover);
    border-left: 1px solid var(--border-hover);
  }
  .social-cell::after {
    bottom: 8px; right: 8px;
    border-bottom: 1px solid var(--border-hover);
    border-right: 1px solid var(--border-hover);
  }

  .social-cell:hover::before,
  .social-cell:hover::after {
    opacity: 1;
  }

  .social-cell:hover {
    background: #161616;
  }

  .social-cell:hover .icon-wrap {
    transform: scale(1.08);
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.15));
  }

  .social-cell:hover .cell-label {
    color: var(--accent);
  }

  /* hover fill overlay */
  .cell-fill {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .social-cell:hover .cell-fill {
    opacity: 1;
  }

  .icon-wrap {
    position: relative;
    z-index: 2;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), filter 0.35s ease;
  }

  .icon-wrap svg {
    width: 36px;
    height: 36px;
    fill: none;
    stroke: rgba(255,255,255,0.7);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.3s ease;
  }

  .social-cell:hover .icon-wrap svg {
    stroke: #ffffff;
  }

  .cell-label {
    position: relative;
    z-index: 2;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.3s ease;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 80px;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  .footer p {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* staggered cell entrance */
  .social-cell {
    opacity: 0;
    transform: scale(0.94);
  }

  .social-cell.visible {
    animation: cellIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  @keyframes cellIn {
    to { opacity: 1; transform: scale(1); }
  }

  /* pulse ring on hover */
  @keyframes pulseRing {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .pulse-ring {
    position: absolute;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    pointer-events: none;
    z-index: 1;
    opacity: 0;
  }

  .social-cell:hover .pulse-ring {
    animation: pulseRing 1s ease-out infinite;
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    :root { --grid-size: 86px; }
    .logo-img { width: 140px; }
    .socials-grid { grid-template-columns: repeat(2, var(--grid-size)); }
    .icon-wrap svg { width: 28px; height: 28px; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<main class="site">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img class="logo-img" src="Untitled-1.png" alt="073north" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
    <div id="logo-text" style="display:none; font-size:36px; font-weight:700; letter-spacing:-0.04em; color:#fff;">073north</div>
  </div>

  <!-- HEADLINE -->
  <div class="headline">
    <p class="eyebrow">Creative Agency — Duhok, Kurdistan</p>
    <h1>Find us.<br><span>Connect with us.</span></h1>
    <p>We work across ten creative disciplines — production, design, and direction. Reach us on the platforms below.</p>
  </div>

  <div class="divider"></div>

  <p class="socials-label">Our channels</p>

  <!-- SOCIAL GRID -->
  <div class="socials-grid" id="socialsGrid">

    <!-- Instagram -->
    <a class="social-cell" href="https://instagram.com/073north" target="_blank" rel="noopener">
      <div class="cell-fill" style="background: radial-gradient(ellipse at center, rgba(131,58,180,0.08) 0%, transparent 70%);"></div>
      <div class="pulse-ring"></div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="17.5" cy="6.5" r="1" fill="rgba(255,255,255,0.7)" stroke="none"/>
        </svg>
      </div>
      <span class="cell-label">Instagram</span>
    </a>

    <!-- TikTok -->
    <a class="social-cell" href="https://tiktok.com/@073north" target="_blank" rel="noopener">
      <div class="cell-fill" style="background: radial-gradient(ellipse at center, rgba(0,242,234,0.06) 0%, transparent 70%);"></div>
      <div class="pulse-ring"></div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
        </svg>
      </div>
      <span class="cell-label">TikTok</span>
    </a>

    <!-- Behance -->
    <a class="social-cell" href="https://www.behance.net/niwarazadd" target="_blank" rel="noopener">
      <div class="cell-fill" style="background: radial-gradient(ellipse at center, rgba(23,105,255,0.08) 0%, transparent 70%);"></div>
      <div class="pulse-ring"></div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M2 6h8.5a4 4 0 0 1 0 8H2V6z"/>
          <path d="M2 14h9a4 4 0 0 1 0 4H2v-4z"/>
          <path d="M15 7h7"/>
          <path d="M22 12c0-2.5-2-4.5-4.5-4.5S13 9.5 13 12s2 4.5 4.5 4.5c1.8 0 3.3-1 4-2.5"/>
        </svg>
      </div>
      <span class="cell-label">Behance</span>
    </a>

    <!-- WhatsApp -->
    <a class="social-cell" href="https://wa.me/9647508375519" target="_blank" rel="noopener">
      <div class="cell-fill" style="background: radial-gradient(ellipse at center, rgba(37,211,102,0.07) 0%, transparent 70%);"></div>
      <div class="pulse-ring"></div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/>
          <path d="M9 10c0 5 6 5 6 0"/>
        </svg>
      </div>
      <span class="cell-label">WhatsApp</span>
    </a>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>073north.co &nbsp;·&nbsp; All rights reserved</p>
  </div>

</main>

<script>
  // Staggered cell entrance
  const cells = document.querySelectorAll('.social-cell');
  cells.forEach((cell, i) => {
    setTimeout(() => {
      cell.classList.add('visible');
      cell.style.animationDelay = '0ms';
    }, 1100 + i * 120);
  });

  // Subtle parallax on grid background
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 12;
    const y = (e.clientY / window.innerHeight - 0.5) * 12;
    document.querySelector('.grid-bg').style.transform = `translate(${x}px, ${y}px)`;
  });

  // Continuous ambient cell glow cycle
  let glowIndex = 0;
  function ambientGlow() {
    cells.forEach(c => c.style.boxShadow = '');
    const cell = cells[glowIndex % cells.length];
    cell.style.transition = 'box-shadow 1.5s ease';
    cell.style.boxShadow = 'inset 0 0 40px rgba(255,255,255,0.03)';
    setTimeout(() => { cell.style.boxShadow = ''; }, 2000);
    glowIndex++;
  }
  setInterval(ambientGlow, 3000);
</script>

</body>
